<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
         signOut, onAuthStateChanged, GoogleAuthProvider, GithubAuthProvider, signInWithPopup, updateProfile,
         updatePassword, deleteUser, reauthenticateWithCredential, EmailAuthProvider }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, deleteDoc,
         addDoc, updateDoc, query, orderBy, serverTimestamp, where, limit, onSnapshot, increment, arrayUnion, arrayRemove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const ADMIN = 'remysan102030@gmail.com';
const cfg = {
  apiKey: "AIzaSyBsUgAqgBRuSdggBq706jXlJ_EM451B8hI",
  authDomain: "vanitas-manga.firebaseapp.com",
  projectId: "vanitas-manga",
  storageBucket: "vanitas-manga.firebasestorage.app",
  messagingSenderId: "474926712582",
  appId: "1:474926712582:web:942392692103a4e3008087"
};
const app  = initializeApp(cfg);
const auth = getAuth(app);
const db   = getFirestore(app);
const gp   = new GoogleAuthProvider();
gp.setCustomParameters({ prompt: 'select_account' });
const ghp  = new GithubAuthProvider();
ghp.addScope('user:email');

window.$auth = auth; window.$db = db; window.$gp = gp; window.$ghp = ghp;
window.ADMIN = ADMIN;
window._ownerUid = null; // set when owner logs in
window.CLOUD = { name: 'djv9uolbx', preset: 'fnnukmsu' };
window.$fb = {
  createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, signInWithPopup, updateProfile, updatePassword, deleteUser,
  reauthenticateWithCredential, EmailAuthProvider,
  collection, getDocs, doc, getDoc, setDoc, deleteDoc,
  addDoc, updateDoc, query, orderBy, serverTimestamp, where, limit, onSnapshot, increment, arrayUnion, arrayRemove
};

onAuthStateChanged(auth, async user => {
  window.ME = user;
  if(user && user.email === ADMIN) window._ownerUid = user.uid;
  if (user) {
    const isAdm = user.email === ADMIN;
    try {
      const snap = await getDoc(doc(db,'users',user.uid));
      const udata = snap.data()||{};
      window.IS_ADMIN = isAdm || udata.role === 'admin';
      if (isAdm && udata.role !== 'admin')
        await setDoc(doc(db,'users',user.uid),{role:'admin'},{merge:true});
      // Sync NSFW setting from Firestore (account-level setting)
      if(typeof udata.nsfw !== 'undefined'){
        window.NSFW = !!udata.nsfw;
        localStorage.setItem('nsfw', window.NSFW?'1':'0');
      } else {
        // First login — push local setting to Firestore
        await setDoc(doc(db,'users',user.uid),{nsfw:window.NSFW},{merge:true});
      }
    } catch(e) { window.IS_ADMIN = isAdm; }
    if(window._authResolve){ window._authResolve(user); window._authResolve=null; }
    onLogin(user);
    syncList(user.uid);
  } else {
    window.IS_ADMIN = false;
    // On logout restore NSFW from localStorage (don't force off)
    window.NSFW = localStorage.getItem('nsfw')==='1';
    if(window._authResolve){ window._authResolve(null); window._authResolve=null; }
    onLogout();
  }
});

async function syncList(uid) {
  try {
    const snap = await getDocs(collection(db,`users/${uid}/list`));
    snap.forEach(d => { window.MY_LIST[d.id] = d.data(); });
    persist();
  } catch(e) {}
}
window._syncList = syncList;
</script>
<style>
/* ═══ TOKENS ══════════════════════════════════════════ */
:root{
  --red:#e63946;--cyan:#4cc9f0;--gold:#f4a261;--green:#4ade80;

/* ═══ BASE ════════════════════════════════════════════ */

/* Logo */

/* ═══ DETAIL ══════════════════════════════════════════ */
.dh{position:relative;height:300px;max-width:100%;background:#111;overflow:visible}
.dh-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 30%;filter:brightness(.4);display:none}
.dh-ov{position:absolute;inset:0;background:linear-gradient(to top,#111 0%,rgba(0,0,0,.5) 50%,rgba(0,0,0,.1) 100%)}
.dh-top{position:absolute;bottom:-55px;left:0;right:0;padding:0 40px 0;display:flex;align-items:flex-end;gap:22px;box-sizing:border-box;overflow:visible}

       border:3px solid var(--bg);box-shadow:0 8px 24px rgba(0,0,0,.5);flex-shrink:0;position:relative;z-index:2}

.abtn{

/* ═══ READER ══════════════════════════════════════════ */
.reader-pg{background:#0a0a0f;min-height:100vh}
.rbar{
  position:sticky;top:0;z-index:450;
  background:rgba(8,8,15,.98);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:8px 14px;display:flex;align-items:center;justify-content:space-between;
  gap:8px;
}
.rti{font-size:13px;font-weight:700;color:#fff}
.rch{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.rcs{display:flex;align-items:center;gap:5px}
.rc{
  width:34px;height:34px;border-radius:8px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.7);font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:all var(--t);
}
.rc:hover{background:var(--red);border-color:var(--red);color:#fff}
.rcnt{font-size:12px;color:rgba(255,255,255,.5);padding:0 4px;white-space:nowrap}
/* Reader info bar (time + page) */
.r-infobar{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 14px;font-size:10px;color:rgba(255,255,255,.4);
  background:rgba(8,8,15,.95);border-bottom:1px solid rgba(255,255,255,.06);
  letter-spacing:.3px;
}
/* Scroll mode */
.pw{max-width:800px;margin:0 auto;padding:20px 10px 80px;
    display:flex;flex-direction:column;align-items:center;gap:2px}
.pimg{width:100%;border-radius:2px}
/* Page-by-page mode */
.pw.paged{
  padding:0;max-width:100vw;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  min-height:calc(100vh - 130px);
  position:relative;
}
.pw.paged .pimg{
  width:auto;max-width:100%;max-height:calc(100vh - 130px);
  object-fit:contain;border-radius:0;
  touch-action:pan-y pinch-zoom;
}
.pw.paged .pimg.hidden{display:none}
/* Swipe zones */
.swipe-zone{
  position:absolute;top:0;width:40%;height:100%;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;z-index:10;cursor:pointer;
}
.swipe-zone.left{left:0}
.swipe-zone.right{right:0}
.swipe-zone:active{opacity:.15;background:var(--txt)}
/* Mode toggle button */
.rmode-btn{
  font-size:11px;padding:4px 10px;border-radius:6px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);

}

  position:sticky;bottom:0;
